<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Testimonials | Baology Prep</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description"
    content="What past Baology students say about the course.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="author" content="Baology Prep">
  <link rel="shortcut icon" href="../images/favicon.ico" />
  <link rel="stylesheet" href="../plugins/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="../plugins/slick/slick.css">
  <link rel="stylesheet" href="../plugins/wow/animate.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="../css/style.css" rel="stylesheet">
</head>

<body>
  <!--Navigation bar-->
  <div id="header"></div>

  <!-- hero area -->
  <section class="hero-area bg-primary" style="padding-bottom: 20vh;">
    <div class="container">
      <div class="row">
        <div class="col-lg-11 mx-auto">
          <h1 class="font-tertiary text-primary-dark"><span class="wow fadeInLeft" data-wow-delay=".4s"
              data-wow-duration="1.3s">Testimonials</span></h1>
        </div>
      </div>
    </div>
    <div class="layer wow fadeInRight" id="l4">
      <img src="../images/illustrations/dots-orange.png" alt="bg-shape">
    </div>
    <div class="layer wow fadeInLeft" id="l5">
      <img src="../images/illustrations/leaf-yellow.png" alt="bg-shape">
    </div>
    <div class="layer wow fadeInDown" id="l6">
      <img src="../images/illustrations/dots-group-orange.png" alt="bg-shape">
    </div>
  </section>
  <!-- /hero area -->

  <section class="section">
    <div class="container">
      <div class="testimonials-grid" data-testimonial-grid></div>
      <template data-testimonial-template>
        <article class="testimonial-card blog-card-shadow wow fadeInUp">
          <i class="fa-solid fa-quote-left icon mb-3"></i>
          <p class="quote" data-quote></p>
          <h5 class="testimonial-name" data-name></h5>
          <div class="testimonial-placement" data-placement></div>
        </article>
      </template>
    </div>
  </section>

  <!-- footer -->
  <footer class="bg-dark footer-section">
    <div class="text-center py-5">
      <p class="mb-0 text-sm text-white">Copyright &copy;2026 Baology</p>
      <p class="mb-0 text-sm text-white">Baology is not affiliated in any way with the USA Biology Olympiad Exam</p>
    </div>
  </footer>
  <!-- /footer -->

  <script src="../plugins/jQuery/jquery.min.js"></script>
  <script src="../plugins/bootstrap/bootstrap.min.js"></script>
  <script src="../plugins/slick/slick.min.js"></script>
  <script src="../plugins/wow/wow.min.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/testimonials.js"></script>
  <script>
    $(function () {
      $("#header").load("../header.html");
    });
  </script>
</body>

</html>
